<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- SCREEN 1: AUTHENTICATION -->
        <div id="auth-screen" class="screen">
            <h2>Welcome to the Quiz</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Enter Username">
                <input type="password" id="password" placeholder="Enter Password">
            </div>
            <div class="btn-group">
                <button id="login-btn">Sign In</button>
                <button id="register-btn">Register</button>
            </div>
            <p id="auth-message" class="message"></p>
        </div>

        <!-- SCREEN 2: ACTIVE QUIZ -->
        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <span id="user-display"></span>
                <span id="progress">Question 1/3</span>
            </div>
            <div id="timer-container">Time Left: <span id="timer">10</span>s</div>
            <h3 id="question-text">Question text goes here?</h3>
            <div id="options-container">
                <!-- JavaScript will inject buttons here -->
            </div>
            <button id="next-btn" disabled>Next Question</button>
        </div>

        <!-- SCREEN 3: RESULTS -->
        <div id="result-screen" class="screen hidden">
            <h2>Quiz Completed! 🎉</h2>
            <p id="final-score">You scored 0 out of 0</p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
